<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fundamentos — Wiki de Melhoria Contínua</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══════════════════ TOPNAV ══════════════════ -->
<nav id="topnav">
  <a href="index.html" class="topnav-brand">
    <div class="brand-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L10 6H14L11 9L12 13L8 11L4 13L5 9L2 6H6L8 2Z" fill="white" fill-opacity="0.9"/></svg></div>
    <div><span class="brand-text-small">Wiki de</span><span class="brand-text-main">Melhoria Contínua</span></div>
  </a>
  <div class="topnav-links">
    <a href="index.html" class="nav-link"><span class="nav-dot" style="background:#1c1c1e"></span>Home (Wiki)</a>
    <a href="fundamentos.html" class="nav-link active"><span class="nav-dot" style="background:#3b82f6"></span>Fundamentos</a>
    <a href="cbok.html" class="nav-link"><span class="nav-dot" style="background:#a855f7"></span>Estudando o CBOK® 4.0</a>
  </div>
</nav>

<!-- ══════════════════ SIDEBAR ══════════════════ -->
<aside id="sidebar">
  <div style="padding:1.25rem; border-bottom:1px solid var(--border)">
    <p class="section-label">Trilha de Fundamentos</p>
    <div id="aula-nav" style="display:flex; flex-direction:column; gap:3px">
      <!-- Injetado via JS -->
    </div>
  </div>

  <div style="flex:1"></div>

  <div class="author-card">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px">
      <div id="author-avatar" style="width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#e2e8f0,#cbd5e1); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.2rem">👤</div>
      <div>
        <p id="author-name" style="font-weight:600; font-size:0.9rem; margin:0; color:#1c1c1e"></p>
        <p id="author-role" style="font-size:0.75rem; color:#6b7280; margin:0"></p>
      </div>
    </div>
    <div style="display:flex; gap:8px">
      <a id="author-linkedin" href="#" target="_blank" class="badge" style="background:#eff6ff; color:#0a66c2; text-decoration:none">LinkedIn</a>
      <a id="author-github" href="#" target="_blank" class="badge" style="background:#f1f0ed; color:#1c1c1e; text-decoration:none">GitHub</a>
    </div>
  </div>
</aside>

<!-- ══════════════════ MAIN ══════════════════ -->
<main id="main">
  <article id="conteudo-aula" style="max-width: 800px;">
    <!-- Injetado via JS -->
  </article>

  <!-- Rodapé de Navegação Atualizado -->
  <div id="aula-footer" style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 20px;">
    <!-- Injetado via JS -->
  </div>
</main>

<script src="js/dados.js"></script>
<script>
  function renderFundamentos() {
    const params = new URLSearchParams(window.location.search);
    const currentId = params.get('aula') || 'nivelamento';
    
    // Busca o índice da aula atual no array de dados
    const currentIndex = FUNDAMENTOS_AULAS.findIndex(a => a.id === currentId);
    const aula = FUNDAMENTOS_AULAS[currentIndex] || FUNDAMENTOS_AULAS[0];

    // 1. Popula Sidebar (Limpando antes para não duplicar)
    const nav = document.getElementById('aula-nav');
    nav.innerHTML = '';
    FUNDAMENTOS_AULAS.forEach(f => {
      const btn = document.createElement('a');
      btn.href = `?aula=${f.id}`;
      btn.className = `nav-btn ${f.id === aula.id ? 'active' : ''}`;
      btn.innerHTML = `<span class="dot"></span> ${f.titulo}`;
      nav.appendChild(btn);
    });

    // 2. Popula Conteúdo Principal
    document.getElementById('conteudo-aula').innerHTML = `
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:1rem;">
        <span style="font-size:2rem">${aula.emoji}</span>
        <h1 style="font-size:2.25rem; font-weight:800; color:var(--text-primary); margin:0">${aula.titulo}</h1>
      </div>
      <p style="font-size:1.1rem; color:var(--text-secondary); margin-bottom:2.5rem">${aula.subtitulo}</p>
      <div class="prose-content">${aula.conteudo}</div>
    `;

    // 3. Navegação Dinâmica (Anterior e Próximo)
    const anterior = FUNDAMENTOS_AULAS[currentIndex - 1];
    const proxima = FUNDAMENTOS_AULAS[currentIndex + 1];
    const footerContainer = document.getElementById('aula-footer');
    
    let footerHtml = '';

    // Lógica do Botão Voltar
    if (anterior) {
      footerHtml += `
        <a href="?aula=${anterior.id}" style="text-decoration:none; flex:1; display:flex; align-items:center; gap:12px; border:1px solid var(--border); padding:12px 20px; border-radius:12px; color:var(--text-primary); transition: 0.2s;" onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='var(--border)'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform: rotate(180deg)"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          <div style="text-align:left">
            <span style="font-size:0.65rem; text-transform:uppercase; opacity:0.6; display:block">Anterior</span>
            <div style="font-weight:700; font-size:0.9rem">${anterior.titulo}</div>
          </div>
        </a>
      `;
    } else {
      footerHtml += `<div style="flex:1"></div>`; // Mantém o equilíbrio visual
    }

    // Lógica do Botão Próximo
    if (proxima) {
      footerHtml += `
        <a href="?aula=${proxima.id}" style="text-decoration:none; flex:1; display:flex; align-items:center; justify-content:flex-end; gap:12px; background:var(--text-primary); color:white; padding:12px 20px; border-radius:12px; transition: 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
          <div style="text-align:right">
            <span style="font-size:0.65rem; text-transform:uppercase; opacity:0.8; display:block">Próxima</span>
            <div style="font-weight:700; font-size:0.9rem">${proxima.titulo}</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      `;
    } else {
      footerHtml += `<div style="flex:1"></div>`;
    }

    footerContainer.innerHTML = footerHtml;

    // 4. Popula Autor
    document.getElementById('author-name').textContent = AUTOR.nome;
    document.getElementById('author-role').textContent = AUTOR.cargo;
    document.getElementById('author-linkedin').href = AUTOR.linkedin;
    document.getElementById('author-github').href = AUTOR.github;
  }

  window.onload = renderFundamentos;
</script>
</body>
</html>
