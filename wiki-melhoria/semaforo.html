<!-- ══════════════════ MAIN CONTENT ══════════════════ -->
<main id="main">
  <div id="content-area" style="max-width: 850px;">
    <header style="display:flex; align-items:center; gap:20px; margin-bottom:2.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border)">
      <div class="traffic-light-mini">
        <div class="tl-bulb" id="bulb-r" style="background:#ef4444"></div>
        <div class="tl-bulb" id="bulb-y" style="background:#eab308"></div>
        <div class="tl-bulb on" id="bulb-g" style="background:#22c55e"></div>
      </div>
      <div>
        <div class="badge" style="background:#ecfdf5; color:#065f46; margin-bottom:6px">Problem-Solving Real</div>
        <h1 style="font-size:1.75rem; font-weight:800; color:#1c1c1e; margin:0">Semáforo Inteligente: A Resposta ao Insight do Negócio (EM DESENVOLVIMENTO)</h1>
      </div>
    </header>

    <div id="dynamic-content" class="fadeInUp">
       <!-- Conteúdo injetado via JS -->
    </div>
  </div>
</main>

<script src="js/dados.js"></script> 
<script>
  // 1. Função para popular o Autor (Puxa da const AUTOR no dados.js)
  function popularAutor() {
    if (typeof AUTOR !== 'undefined') {
      document.getElementById('author-name').textContent = AUTOR.nome;
      document.getElementById('author-role').textContent = AUTOR.cargo;
      document.getElementById('author-bio').textContent = AUTOR.bio;
      document.getElementById('author-linkedin').href = AUTOR.linkedin;
      document.getElementById('author-github').href = AUTOR.github;
      document.getElementById('author-avatar').textContent = AUTOR.emoji;
    }
  }

  // 2. Lógica de Renderização Dinâmica do Case
  const menuBtns = document.querySelectorAll('.case-nav-btn');
  const contentArea = document.getElementById('dynamic-content');

  function renderView(view) {
    if (typeof CASE_SEMAFORO !== 'undefined' && CASE_SEMAFORO[view]) {
      const data = CASE_SEMAFORO[view];
      contentArea.style.opacity = 0;
      
      setTimeout(() => {
        contentArea.innerHTML = `
          <div class="fadeInUp">
            <h2 style="font-size:1.25rem; font-weight:700; color:#0f766e; margin-bottom:0.5rem">${data.titulo}</h2>
            <p style="font-size:0.85rem; color:#9ca3af; margin-bottom:1.5rem">${data.subtitulo}</p>
            <div class="prose-text">${data.html}</div>
          </div>
        `;
        contentArea.style.opacity = 1;
      }, 150);
    }
  }

  menuBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      menuBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderView(btn.getAttribute('data-view'));
    });
  });

  // 3. Semáforo Mini Animado
  const bulbs = ['r','y','g'];
  let current = 2;
  setInterval(() => {
    const r = document.getElementById('bulb-r');
    const y = document.getElementById('bulb-y');
    const g = document.getElementById('bulb-g');
    if (r && y && g) {
      [r, y, g].forEach(b => b.classList.remove('on'));
      current = (current + 1) % 3;
      document.getElementById(`bulb-${bulbs[current]}`).classList.add('on');
    }
  }, 2000);

  // Inicialização Geral
  window.onload = () => {
    popularAutor();
    renderView('intro');
  };
</script>

</body>
